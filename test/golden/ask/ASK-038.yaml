id: ASK-038
version: 1
category: cli-usage
difficulty: hard
requires:
  tools: []
prompt: |
  我想把 CodeClaw 接到本机 LM Studio（OpenAI 兼容 API，跑在 http://127.0.0.1:1234），
  请给出：
  1. 最少需要改哪个文件
  2. 配置里 type / baseUrl / model / apiKeyEnvVar 各应填什么
  3. 怎么验证连通性（一条命令）
expected:
  must_mention:
    - providers.json 或 ~/.codeclaw
    - lmstudio 或 lm studio 或 openai
    - baseUrl 或 base_url
    - 127.0.0.1:1234 或 localhost:1234
    - curl 或 doctor
  must_not_mention:
    - sk-ant-
    - OPENAI_API_KEY=sk-
  rubric: |
    应答出：
    1. 改 `~/.codeclaw/providers.json`（或用 codeclaw setup 引导）
    2. 字段：
       - type: "lmstudio"（或 "openai"，因为 OpenAI 兼容）
       - baseUrl: "http://127.0.0.1:1234/v1"
       - model: 由 LM Studio UI 显示的 model id（如 "qwen/qwen3.6-35b-a3b"）
       - apiKeyEnvVar: 可不填或空（LM Studio 默认不校验 key）
    3. 验证：
       - `curl http://127.0.0.1:1234/v1/models` 看是否返当前 load 的模型
       - 或 `codeclaw doctor` 看 provider 行是否 "available"
    不应在文档里粘真 sk- 开头的密钥示例。
  answer_key: ASK-038.md

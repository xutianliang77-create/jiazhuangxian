id: ASK-037
version: 1
category: cli-usage
difficulty: medium
requires:
  tools: []
prompt: |
  CodeClaw 提供 `codeclaw skill` 子命令。请说明：
  - 三个子命令各做什么、参数是什么
  - 装到磁盘上的目标位置在哪
  - 哪些 skill 不能 remove
expected:
  must_mention:
    - install
    - remove 或 uninstall
    - list
    - ~/.codeclaw/skills 或 .codeclaw/skills
    - builtin 或 内置
  must_not_mention:
    - npm install
    - skill update
  rubric: |
    `codeclaw skill <subcommand>`：
    - `list`：列出 builtin（review / explain / patch / data_insight）+ user 已装 skill
    - `install <local-path>`：从本地路径校验 manifest 后 cp 到 `~/.codeclaw/skills/<name>/`
    - `remove <name>`：删除 user skill 目录；**builtin 不可 remove**
    - 不存在 `update` / `npm install` 路径（都是本地路径 cp）
  answer_key: ASK-037.md

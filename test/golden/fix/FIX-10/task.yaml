id: FIX-10
version: 1
language: py
workspace: test/golden/fix/FIX-10/workspace
setup:
  install: "python3 -m venv .venv && . .venv/bin/activate && pip install -q -r requirements.txt"
  verify_broken: ". .venv/bin/activate && pytest -q 2>&1 | grep -q 'failed'"
prompt: |
  这是一个判断"文本是否含某个完整单词"的工具。
  跑 `pytest` 会看到 `test_substring_should_not_match` 失败：
    "football" 不应被识别为含 "foo"，但当前实现把 "foo" 子串当 hit。
  根因：wordfilter.py 用了 `re.search(escape(word), text)` 没加词边界 \\b。
  请修这一行，让函数只识别**完整单词**：前后是字符串边界或非字母数字字符（即 \\b）。
  不要改测试。
expected:
  post_verify: ". .venv/bin/activate && pytest -q 2>&1 | grep -q '6 passed'"
  diff_scope:
    allow_paths: ["wordfilter.py"]
    max_files: 1
    max_lines: 5
  forbidden_changes:
    - "requirements.txt"
    - "test_*.py"
  time_budget_sec: 120
  token_budget_usd: 0.2
category: regex-word-boundary
difficulty: medium

suite: codeclaw-data-golden
version: 1
description: 100 data-analysis golden cases for CodeClaw + Beelink MCP behavior.
cases:
  - id: DATA-001
    version: 1
    layer: metadata
    difficulty: easy
    prompt: "用户问：有哪些食物相关的数据表？先做本地元数据检索。"
    expected: { tool_calls: { must_invoke: ["SearchMetadataIndex"] }, must_mention: ["候选表 或 数据表", "food 或 食物"], must_not_mention: ["凭空"] }
  - id: DATA-002
    version: 1
    layer: metadata
    difficulty: easy
    prompt: "用户只说 chatbi_food_sales，要求查看字段。"
    expected: { tool_calls: { must_invoke: ["GetSchemaOfTable"] }, must_mention: ["字段", "schema 或 列"], must_not_mention: ["SELECT * 直接分析"] }
  - id: DATA-003
    version: 1
    layer: metadata
    difficulty: easy
    prompt: "用户说不知道表在哪里，让你查 catalog 里的 food。"
    expected: { tool_calls: { must_invoke: ["SearchCatalog 或 SearchMetadataIndex"] }, must_mention: ["catalog 或 元数据", "候选"], must_not_mention: ["猜测表名"] }
  - id: DATA-004
    version: 1
    layer: metadata
    difficulty: medium
    prompt: "本地没有 food 相关元数据时，下一步怎么探查？"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion"] }, must_mention: ["本地不足", "实时探查 或 上游"], must_not_mention: ["直接写最终 SQL"] }
  - id: DATA-005
    version: 1
    layer: metadata
    difficulty: medium
    prompt: "同步 @x 下 catalog/schema 到本地。"
    expected: { tool_calls: { must_invoke: ["SyncMetadataIndex"] }, must_mention: ["metadata.db", "同步"], must_not_mention: ["删除"] }
  - id: DATA-006
    version: 1
    layer: metadata
    difficulty: medium
    prompt: "查看本地元数据索引中 item_name 或 quantity 字段相关的表。"
    expected: { tool_calls: { must_invoke: ["SearchMetadataIndex"] }, must_mention: ["item_name 或 quantity", "字段 或 column"], must_not_mention: ["全库扫描 SQL"] }
  - id: DATA-007
    version: 1
    layer: metadata
    difficulty: hard
    prompt: "用户问两个表是否可 join，先找主外键/字段线索。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion 或 GetTableOrViewLineage"] }, must_mention: ["join", "候选键 或 lineage"], must_not_mention: ["笛卡尔积"] }
  - id: DATA-008
    version: 1
    layer: metadata
    difficulty: hard
    prompt: "用户问某字段枚举值含义，先查样本和字段注释。"
    expected: { tool_calls: { must_invoke: ["SearchMetadataIndex 或 GetSchemaOfTable"] }, must_mention: ["样本", "字段含义"], must_not_mention: ["臆测"] }
  - id: DATA-009
    version: 1
    layer: metadata
    difficulty: medium
    prompt: "元数据过期，用户要求重新同步并说明存储位置。"
    expected: { tool_calls: { must_invoke: ["SyncMetadataIndex"] }, must_mention: ["metadata.db", "~/.codeclaw/projects"], must_not_mention: ["内存临时"] }
  - id: DATA-010
    version: 1
    layer: metadata
    difficulty: hard
    prompt: "用户问为什么找不到表，要区分本地索引为空和权限不足。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion"] }, must_mention: ["权限 或 permission", "索引 或 metadata"], must_not_mention: ["一定不存在"] }

  - id: DATA-011
    version: 1
    layer: semantic
    difficulty: easy
    prompt: "用户问 chatbi_food_sales 里最畅销商品，先利用语义层找指标和实体。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion"] }, must_mention: ["semantic-layer 或 语义层", "指标 或 metric"], must_not_mention: ["直接 COUNT(*)"] }
  - id: DATA-012
    version: 1
    layer: semantic
    difficulty: easy
    prompt: "初始化语义层草稿。"
    expected: { tool_calls: { must_invoke: ["InitSemanticLayer"] }, must_mention: ["semantic-layer.json", "glossary.md"], must_not_mention: ["人工已确认"] }
  - id: DATA-013
    version: 1
    layer: semantic
    difficulty: medium
    prompt: "用户基于 chatbi_food_sales 说客单价，语义层里没有明确口径。"
    expected: { tool_calls: { must_invoke: ["BuildSqlGuidance 或 ExploreForQuestion"] }, must_mention: ["口径", "假设 或 确认"], must_not_mention: ["确定无误"] }
  - id: DATA-014
    version: 1
    layer: semantic
    difficulty: medium
    prompt: "用户基于 chatbi_food_sales 用中文同义词销量，字段叫 quantity。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion"] }, must_mention: ["同义词", "字段映射"], must_not_mention: ["只按英文名"] }
  - id: DATA-015
    version: 1
    layer: semantic
    difficulty: hard
    prompt: "用 chatbi_food_sales 比较销量最高和销售额最高的食物，必须区分 quantity 与 sales_amount。"
    expected: { tool_calls: { must_invoke: ["BuildSqlGuidance", "RunSqlQuery"] }, must_mention: ["Bread", "Steak", "quantity", "sales_amount"], must_not_mention: ["混为一谈"] }
  - id: DATA-016
    version: 1
    layer: semantic
    difficulty: hard
    prompt: "用户基于 chatbi_food_sales 问复购率，语义层未审核该指标。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion"] }, must_mention: ["复购率", "未审核 或 需确认"], must_not_mention: ["最终结论"] }
  - id: DATA-017
    version: 1
    layer: semantic
    difficulty: medium
    prompt: "用户问 chatbi_food_sales 的 item_name 字段业务含义。"
    expected: { tool_calls: { must_invoke: ["SearchMetadataIndex 或 GetSchemaOfTable"] }, must_mention: ["item_name", "食物 或 商品"], must_not_mention: ["随机命名"] }
  - id: DATA-018
    version: 1
    layer: semantic
    difficulty: medium
    prompt: "根据 glossary 解释 chatbi_food_sales.sales_amount 的业务含义。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion 或 BuildSqlGuidance"] }, must_mention: ["glossary", "sales_amount"], must_not_mention: ["无依据"] }
  - id: DATA-019
    version: 1
    layer: semantic
    difficulty: hard
    prompt: "用户要求为 chatbi_food_sales 自动生成业务词典草稿后继续分析。"
    expected: { tool_calls: { must_invoke: ["InitSemanticLayer 或 ExploreForQuestion"] }, must_mention: ["草稿", "需审核"], must_not_mention: ["生产可用"] }
  - id: DATA-020
    version: 1
    layer: semantic
    difficulty: hard
    prompt: "食物实体可能在多张表出现，要求给 chatbi_food_sales 等候选表排序。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion"] }, must_mention: ["候选表", "置信 或 排序"], must_not_mention: ["唯一确定"] }

  - id: DATA-021
    version: 1
    layer: sql
    difficulty: easy
    prompt: "把 @x.chatbi_food_sales 转成可执行 SQL 引用。"
    expected: { tool_calls: { must_invoke: ["PrepareSqlReference"] }, must_mention: ["\"@x\".chatbi_food_sales", "引用"], must_not_mention: ["@x.chatbi_food_sales 直接执行"] }
  - id: DATA-022
    version: 1
    layer: sql
    difficulty: easy
    prompt: "写 chatbi_food_sales 分析 SQL 前先获取规则指导。"
    expected: { tool_calls: { must_invoke: ["BuildSqlGuidance"] }, must_mention: ["规则", "SQL"], must_not_mention: ["绕过规则"] }
  - id: DATA-023
    version: 1
    layer: sql
    difficulty: medium
    prompt: "用户要查 @x.chatbi_food_sales 前 5 行，避免 @ 词法错误。"
    expected: { tool_calls: { must_invoke: ["PrepareSqlReference", "RunSqlQuery"] }, must_mention: ["LIMIT 5", "\"@x\""], must_not_mention: ["Lexical error"] }
  - id: DATA-024
    version: 1
    layer: sql
    difficulty: medium
    prompt: "生成 chatbi_food_sales SQL 后执行前必须检查规则。"
    expected: { tool_calls: { must_invoke: ["CheckSqlAgainstRules"] }, must_mention: ["规则检查", "执行前"], must_not_mention: ["直接运行"] }
  - id: DATA-025
    version: 1
    layer: sql
    difficulty: hard
    prompt: "chatbi_food_sales 已有 item_name 和 quantity，要求统计单个食物销量。"
    expected: { tool_calls: { must_invoke: ["BuildSqlGuidance", "CheckSqlAgainstRules"] }, must_mention: ["item_name", "SUM(quantity) 或 quantity"], must_not_mention: ["完整组合当单品"] }
  - id: DATA-026
    version: 1
    layer: sql
    difficulty: hard
    prompt: "SQL 方言不支持 WITH RECURSIVE，下一步怎么做？"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt"] }, must_mention: ["方言", "修复"], must_not_mention: ["继续重复 WITH RECURSIVE"] }
  - id: DATA-027
    version: 1
    layer: sql
    difficulty: medium
    prompt: "用户要 chatbi_food_sales 里销售额最高的食物，字段是 sales_amount。"
    expected: { tool_calls: { must_invoke: ["BuildSqlGuidance"] }, must_mention: ["sales_amount", "SUM"], must_not_mention: ["COUNT 代替销售额"] }
  - id: DATA-028
    version: 1
    layer: sql
    difficulty: hard
    prompt: "用户要按 chatbi_food_sales.order_date 过滤，日期列是文本格式。"
    expected: { tool_calls: { must_invoke: ["BuildSqlGuidance", "CheckSqlAgainstRules"] }, must_mention: ["date", "过滤"], must_not_mention: ["未验证格式"] }
  - id: DATA-029
    version: 1
    layer: sql
    difficulty: medium
    prompt: "禁止生成 DELETE/UPDATE，只能只读分析。"
    expected: { tool_calls: { must_invoke: ["CheckSqlAgainstRules"] }, must_mention: ["只读", "SELECT"], must_not_mention: ["DELETE", "UPDATE"] }
  - id: DATA-030
    version: 1
    layer: sql
    difficulty: hard
    prompt: "用户要把 chatbi_food_sales join 其他表，要求先校验引用和 join key。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion", "CheckSqlAgainstRules"] }, must_mention: ["join key", "候选"], must_not_mention: ["无条件 JOIN"] }

  - id: DATA-031
    version: 1
    layer: execution
    difficulty: easy
    prompt: "执行 chatbi_food_sales 只读 SQL，默认只返回前 5 行 preview。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["preview", "5"], must_not_mention: ["全量返回"] }
  - id: DATA-032
    version: 1
    layer: execution
    difficulty: easy
    prompt: "用户要看 chatbi_food_sales 的 100 万行明细。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery 或 ExportSqlArtifact"] }, must_mention: ["限制", "artifact 或 preview"], must_not_mention: ["终端打印 100 万行"] }
  - id: DATA-033
    version: 1
    layer: execution
    difficulty: medium
    prompt: "chatbi_food_sales SQL 执行成功但结果为空。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["0 行 或 空结果", "过滤条件"], must_not_mention: ["有结果"] }
  - id: DATA-034
    version: 1
    layer: execution
    difficulty: medium
    prompt: "用户问有几个用户，优先系统元数据并权限降级。"
    expected: { tool_calls: { must_invoke: ["CountUsers"] }, must_mention: ["用户", "fallback 或 权限"], must_not_mention: ["确定全部用户"] }
  - id: DATA-035
    version: 1
    layer: execution
    difficulty: hard
    prompt: "chatbi_food_sales 执行结果超过 preview，需要保存 artifact。"
    expected: { tool_calls: { must_invoke: ["ExportSqlArtifact"] }, must_mention: ["artifact", "行数限制"], must_not_mention: ["全部塞进上下文"] }
  - id: DATA-036
    version: 1
    layer: execution
    difficulty: medium
    prompt: "用户要查看 chatbi_food_sales 查询的 query id 和前 5 行。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["query id", "preview"], must_not_mention: ["隐藏执行信息"] }
  - id: DATA-037
    version: 1
    layer: execution
    difficulty: hard
    prompt: "执行 chatbi_food_sales SQL 前发现规则 warning，能安全修就修。"
    expected: { tool_calls: { must_invoke: ["CheckSqlAgainstRules", "RunSqlQuery"] }, must_mention: ["warning", "修正"], must_not_mention: ["忽略错误"] }
  - id: DATA-038
    version: 1
    layer: execution
    difficulty: medium
    prompt: "用户要 chatbi_food_sales 的 schema 和样本，再决定 SQL。"
    expected: { tool_calls: { must_invoke: ["GetSchemaOfTable", "RunSqlQuery"] }, must_mention: ["schema", "样本"], must_not_mention: ["直接结论"] }
  - id: DATA-039
    version: 1
    layer: execution
    difficulty: hard
    prompt: "用户要求复核 chatbi_food_sales 查询结果，回答必须只基于 preview。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["基于 preview", "不确定"], must_not_mention: ["未见数据"] }
  - id: DATA-040
    version: 1
    layer: execution
    difficulty: hard
    prompt: "chatbi_food_sales SQL 成功但用户说结果不对，要求反向补探查。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion 或 GetSchemaOfTable"] }, must_mention: ["口径", "复核"], must_not_mention: ["坚持原结论"] }

  - id: DATA-041
    version: 1
    layer: repair
    difficulty: easy
    prompt: "查询 @x.chatbi_food_sales 时 SQL 报 @ 词法错误。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt"] }, must_mention: ["PrepareSqlReference", "\"@x\""], must_not_mention: ["原 SQL 重试"] }
  - id: DATA-042
    version: 1
    layer: repair
    difficulty: easy
    prompt: "查询 chatbi_food_sales 时 SQL 报列不存在。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt 或 GetSchemaOfTable"] }, must_mention: ["列不存在", "schema"], must_not_mention: ["随便换列"] }
  - id: DATA-043
    version: 1
    layer: repair
    difficulty: medium
    prompt: "查询 chatbi_food_sales 时 SQL 报表不存在。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt 或 SearchCatalog"] }, must_mention: ["表不存在", "候选路径"], must_not_mention: ["确定无表"] }
  - id: DATA-044
    version: 1
    layer: repair
    difficulty: medium
    prompt: "分析 chatbi_food_sales 时 SQL 函数不支持。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt"] }, must_mention: ["函数", "方言"], must_not_mention: ["重复同一函数"] }
  - id: DATA-045
    version: 1
    layer: repair
    difficulty: hard
    prompt: "权限不足访问 sys.roles。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt 或 CountUsers"] }, must_mention: ["权限不足", "fallback"], must_not_mention: ["管理员权限已具备"] }
  - id: DATA-046
    version: 1
    layer: repair
    difficulty: hard
    prompt: "查询 chatbi_food_sales 超时，需要缩小范围。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt"] }, must_mention: ["LIMIT 或 过滤", "超时"], must_not_mention: ["无限重试"] }
  - id: DATA-047
    version: 1
    layer: repair
    difficulty: medium
    prompt: "chatbi_food_sales 聚合 GROUP BY 错误，需要修复 SQL。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt", "CheckSqlAgainstRules"] }, must_mention: ["GROUP BY", "修复"], must_not_mention: ["忽略聚合错误"] }
  - id: DATA-048
    version: 1
    layer: repair
    difficulty: hard
    prompt: "chatbi_food_sales 语义层口径和 SQL 结果冲突。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion 或 BuildSqlGuidance"] }, must_mention: ["口径冲突", "澄清"], must_not_mention: ["强行结论"] }
  - id: DATA-049
    version: 1
    layer: repair
    difficulty: hard
    prompt: "chatbi_food_sales SQL 修复后重试最多一次，避免循环。"
    expected: { tool_calls: { must_invoke: ["RepairSqlAttempt"] }, must_mention: ["重试", "一次 或 限制"], must_not_mention: ["无限循环"] }
  - id: DATA-050
    version: 1
    layer: repair
    difficulty: hard
    prompt: "chatbi_food_sales SQL 执行成功但业务结果被用户判定错误。"
    expected: { tool_calls: { must_invoke: ["ExploreForQuestion", "BuildSqlGuidance"] }, must_mention: ["用户反馈", "反向补探查"], must_not_mention: ["只看执行成功"] }

  - id: DATA-051
    version: 1
    layer: chart
    difficulty: easy
    prompt: "把 chatbi_food_sales 的 top 10 食物销量做柱状图。"
    expected: { tool_calls: { must_invoke: ["PrepareChartRenderArgs"] }, must_mention: ["bar 或 柱状图", "top 10"], must_not_mention: ["饼图默认"] }
  - id: DATA-052
    version: 1
    layer: chart
    difficulty: easy
    prompt: "按 chatbi_food_sales.order_date 看销售趋势。"
    expected: { tool_calls: { must_invoke: ["PrepareChartRenderArgs"] }, must_mention: ["line 或 折线图", "日期"], must_not_mention: ["散点图"] }
  - id: DATA-053
    version: 1
    layer: chart
    difficulty: medium
    prompt: "用户要 chatbi_food_sales category 占比图，先确认分类和数值。"
    expected: { tool_calls: { must_invoke: ["PrepareChartRenderArgs"] }, must_mention: ["pie 或 占比", "分类"], must_not_mention: ["无数值字段"] }
  - id: DATA-054
    version: 1
    layer: chart
    difficulty: medium
    prompt: "chatbi_food_sales 数据太多不适合画图。"
    expected: { tool_calls: { must_invoke: ["PrepareChartRenderArgs 或 RunSqlQuery"] }, must_mention: ["聚合", "限制"], must_not_mention: ["全部点位"] }
  - id: DATA-055
    version: 1
    layer: chart
    difficulty: hard
    prompt: "用户要 chatbi_food_sales 图表并解释异常值。"
    expected: { tool_calls: { must_invoke: ["PrepareChartRenderArgs"] }, must_mention: ["异常值", "基于结果"], must_not_mention: ["臆测原因"] }
  - id: DATA-056
    version: 1
    layer: chart
    difficulty: hard
    prompt: "要比较 chatbi_food_sales 的 quantity 和 sales_amount 两个指标，选择合适图表。"
    expected: { tool_calls: { must_invoke: ["PrepareChartRenderArgs"] }, must_mention: ["双指标 或 对比", "图表"], must_not_mention: ["单指标结论"] }
  - id: DATA-057
    version: 1
    layer: chart
    difficulty: medium
    prompt: "chatbi_food_sales 图表参数必须来自 SQL 结果。"
    expected: { tool_calls: { must_invoke: ["PrepareChartRenderArgs"] }, must_mention: ["query preview", "chart_render"], must_not_mention: ["手写假数据"] }
  - id: DATA-058
    version: 1
    layer: chart
    difficulty: hard
    prompt: "用户要下载 chatbi_food_sales 图表数据。"
    expected: { tool_calls: { must_invoke: ["ExportSqlArtifact 或 PrepareChartRenderArgs"] }, must_mention: ["artifact", "导出"], must_not_mention: ["聊天全文数据"] }
  - id: DATA-059
    version: 1
    layer: chart
    difficulty: medium
    prompt: "chatbi_food_sales 图表前需要排序 top N。"
    expected: { tool_calls: { must_invoke: ["CheckSqlAgainstRules", "PrepareChartRenderArgs"] }, must_mention: ["ORDER BY", "LIMIT"], must_not_mention: ["未排序"] }
  - id: DATA-060
    version: 1
    layer: chart
    difficulty: hard
    prompt: "chatbi_food_sales 图表生成失败时回退文本表格。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery 或 PrepareChartRenderArgs"] }, must_mention: ["回退", "表格"], must_not_mention: ["空白回复"] }

  - id: DATA-061
    version: 1
    layer: report
    difficulty: easy
    prompt: "用户要一句话总结 chatbi_food_sales 查询结果。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["总结", "preview"], must_not_mention: ["未查询"] }
  - id: DATA-062
    version: 1
    layer: report
    difficulty: medium
    prompt: "用户要 chatbi_food_sales 完整报表，包含口径、SQL、结果和限制。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["口径", "SQL", "限制"], must_not_mention: ["只给结论"] }
  - id: DATA-063
    version: 1
    layer: report
    difficulty: medium
    prompt: "chatbi_food_sales 结果只有 5 行 preview，报告必须说明截断。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["preview", "截断 或 truncated"], must_not_mention: ["全量"] }
  - id: DATA-064
    version: 1
    layer: report
    difficulty: hard
    prompt: "用户基于 chatbi_food_sales 要求经营建议，必须区分数据结论和建议。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["数据结论", "建议"], must_not_mention: ["确定因果"] }
  - id: DATA-065
    version: 1
    layer: report
    difficulty: hard
    prompt: "chatbi_food_sales 报表要列出 SQL 和 query id 便于审计。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["query id", "SQL"], must_not_mention: ["不可追溯"] }
  - id: DATA-066
    version: 1
    layer: report
    difficulty: medium
    prompt: "用户要求 chatbi_food_sales 中文报告。"
    expected: { tool_calls: { must_invoke: ["RunSqlQuery"] }, must_mention: ["中文", "结果"], must_not_mention: ["English only"] }
  - id: DATA-067
    version: 1
    layer: report
    difficulty: hard
    prompt: "chatbi_food_sales 指标口径不确定时如何写报告。"
    expected: { tool_calls: { must_invoke: ["BuildSqlGuidance"] }, must_mention: ["不确定", "口径"], must_not_mention: ["绝对准确"] }
  - id: DATA-068
    version: 1
    layer: report
    difficulty: medium
    prompt: "用户要把 chatbi_food_sales 结果导出供后续 review。"
